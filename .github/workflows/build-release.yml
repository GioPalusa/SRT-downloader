name: build-and-release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Build wheel and sdist
        run: python -m build

      - name: Smoke test packaged CLI
        run: |
          python -m pip install --force-reinstall dist/*.whl
          srt-download --help > /dev/null

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  standalone-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            artifact_name: standalone-macos-x64
            executable_name: srt-download
            asset_name: srt-download-macos-x64
          - os: macos-14
            artifact_name: standalone-macos-arm64
            executable_name: srt-download
            asset_name: srt-download-macos-arm64
          - os: windows-latest
            artifact_name: standalone-windows-x64
            executable_name: srt-download.exe
            asset_name: srt-download-windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Build standalone executable
        run: pyinstaller fetch_srt_subtitles.spec

      - name: Smoke test executable
        shell: bash
        run: ./dist/${{ matrix.executable_name }} --version

      - name: Rename release asset
        shell: bash
        run: mv ./dist/${{ matrix.executable_name }} ./dist/${{ matrix.asset_name }}

      - name: Upload standalone executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./dist/${{ matrix.asset_name }}
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - python-package
      - standalone-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/python-packages/*
            release-assets/standalone-macos-x64/srt-download-macos-x64
            release-assets/standalone-macos-arm64/srt-download-macos-arm64
            release-assets/standalone-windows-x64/srt-download-windows-x64.exe
